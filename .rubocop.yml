plugins:
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec
  - rubocop-factory_bot

AllCops:
  TargetRubyVersion: 3.4.2
  NewCops: enable
  Exclude:
    - "app/views/**/*"
    - "bin/*"
    - "config/**/*"
    - "db/schema.rb"
    - "db/migrate/*"
    - "node_modules/**/*"
    - "log/**/*"
    - "public/**/*"
    - "storage/**/*"
    - "tmp/**/*"
    - "vendor/**/*"

Rails/UnknownEnv:
  Environments:
    - development
    - test
    - staging
    - production

Style/AsciiComments:
  Enabled: false

Style/SymbolArray:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/WordArray:
  Enabled: false

Style/NumericPredicate:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

Metrics/MethodLength:
  CountAsOne:
    - hash
    - array

RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  CountAsOne:
    - array
    - hash
